<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanches da Merinha</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff5e6;}
header{background:linear-gradient(90deg,#ff7a00,#ff9a3c);color:white;text-align:center;padding:20px;font-size:26px;}
.container{padding:20px;max-width:800px;margin:auto;}
h1{margin-top:25px;color:#333;}

.box{
background:white;
padding:15px;
border-radius:12px;
margin-bottom:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

label{display:block;margin:5px 0;}
select,input{padding:5px;margin-top:5px;}

button{
background:#25D366;
color:white;
border:none;
padding:15px;
border-radius:10px;
width:100%;
margin-top:10px;
font-size:16px;
}

.btnAdd{background:#ff7a00;}
.btnRemove{background:#ff3c00;}

.totalBox{
background:#fff;
border:2px solid #ff7a00;
padding:15px;
border-radius:12px;
text-align:center;
font-size:20px;
margin-top:20px;
}
.configBtn{
position:fixed;
right:15px;
bottom:15px;
width:55px;
height:55px;
border-radius:50%;
background:#333;
font-size:25px;
z-index:10;
}

.adminBox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000000cc;
z-index:20;
justify-content:center;
align-items:center;
}

.adminContent{
background:white;
padding:20px;
border-radius:12px;
width:90%;
max-width:450px;
max-height:90%;
overflow:auto;
}

.adminContent input{
width:100%;
padding:10px;
margin:5px 0;
}
</style>
</head>

<body>

<header>🍔 Lanches da Merinha</header>

<div class="container">

<div id="pasteisArea">
<h1>🥟 Pastéis</h1>
<div id="pasteis"></div>
<button class="btnAdd" onclick="addPastel()">➕ Adicionar pastel</button>
</div>
  
<div id="pratinhosArea">
<h1>🍛 Pratinhos</h1>
<div id="pratinhos"></div>
<button class="btnAdd" onclick="addPratinho()">➕ Adicionar pratinho</button>
</div>

<div id="batatasArea">
<h1>🍟 Batatinhas</h1>
<div id="batatas"></div>
<button class="btnAdd" onclick="addBatata()">➕ Adicionar batata</button>
</div>

<div id="combosArea">
<h1>🔥 Combos Especiais</h1>
<div id="combos"></div>
<button class="btnAdd" onclick="addCombo()">➕ Adicionar combo</button>
</div>
  
  <div class="totalBox">
Total: R$ <span id="total">0</span>
</div>

<button onclick="enviarPedido()">Enviar pedido no WhatsApp</button>

</div>
<button class="configBtn" onclick="abrirAdmin()">⚙️</button>

<div id="adminBox" class="adminBox">
<div class="adminContent">

<h2>⚙️ Configurações</h2>

<h3>Mostrar / Ocultar Categorias</h3>

<button onclick="alternarCategoria('pasteisArea')">🥟 Mostrar/Ocultar Pastéis</button>
<button onclick="alternarCategoria('pratinhosArea')">🍛 Mostrar/Ocultar Pratinhos</button>
<button onclick="alternarCategoria('batatasArea')">🍟 Mostrar/Ocultar Batatinhas</button>
<button onclick="alternarCategoria('combosArea')">🔥 Mostrar/Ocultar Combos</button>

<h3>Adicionar Combo Especial</h3>
<input id="nomeComboAdmin" placeholder="Nome do combo">
<input id="descComboAdmin" placeholder="Descrição do combo">
<input id="precoComboAdmin" placeholder="Preço do combo">

<button class="btnAdd" onclick="criarComboAdmin()">Adicionar combo ao cardápio</button>

<h3>Combos cadastrados</h3>
<div id="listaCombosAdmin"></div>

<button class="btnRemove" onclick="fecharAdmin()">Fechar</button>

</div>
</div>
<!-- RESUMO -->
<div id="resumoBox" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000cc; justify-content:center; align-items:center;">
<div style="background:white; padding:20px; border-radius:12px; width:90%; max-width:400px; max-height:80%; overflow:auto;">
<h2>🧾 Resumo do Pedido</h2>
<div id="resumoConteudo"></div>
<button onclick="confirmarPedido()">✅ Confirmar Pedido</button>
<button onclick="fecharResumo()" class="btnRemove">❌ Cancelar</button>
</div>
</div>

<script>
let countPastel=0;
let countPrato=0;
let countBatata=0;
let countCombo=0;

// ===== PASTEL =====
function addPastel(){
countPastel++;
let div=document.createElement("div");
div.className="box";

div.innerHTML=`
<h3>Pastel ${countPastel}</h3>

<label>Tamanho:</label>
<select class="tam">
<option value="6">14 cm - R$6</option>
<option value="8">24 cm - R$8</option>
</select>

<label>Sabor:</label>
<select class="sabor">
<option>Carne</option>
<option>Misto</option>
<option>Mistão</option>
<option>Carne c/ queijo</option>
<option>Frango c/ queijo</option>
<option>Frango</option>
<option>Queijo</option>
<option>Pizza</option>
</select>

<p><strong>Adicionais:</strong></p>
<label><input type="checkbox" value="Catupiry"> Catupiry</label>
<label><input type="checkbox" value="Maionese"> Maionese</label>
<label><input type="checkbox" value="Cheddar"> Cheddar</label>
<label><input type="checkbox" value="Ketchup"> Ketchup</label>
<label><input type="checkbox" value="Milho"> Milho</label>
<label><input type="checkbox" value="Azeitona"> Azeitona</label>

<button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>
`;

document.getElementById("pasteis").appendChild(div);
atualizarTotal();
}

// ===== PRATINHO =====
function addPratinho(){
countPrato++;
let div=document.createElement("div");
div.className="box";

div.innerHTML=`
<h3>Pratinho ${countPrato}</h3>

<label>Tipo:</label>
<select class="tipo" onchange="atualizarItensPrato(this)">
<option value="tradicional" data-preco="8">Tradicional - R$8</option>
<option value="fome" data-preco="11">Tô com Fome - R$11</option>
</select>

<div class="itensPrato"></div>

<p><strong>Adicionais (+R$3):</strong></p>
<label><input type="checkbox" class="extraPrato" value="Calabresa"> Calabresa</label>
<label><input type="checkbox" class="extraPrato" value="Batata"> Batata</label>

<button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>
`;

document.getElementById("pratinhos").appendChild(div);
atualizarItensPrato(div.querySelector(".tipo"));
atualizarTotal();
}

// ===== TROCAR ITENS =====
function atualizarItensPrato(select){
let container = select.parentElement.querySelector(".itensPrato");

if(select.value === "tradicional"){
container.innerHTML = `
<p><strong>Itens:</strong></p>
<label><input type="checkbox" value="Arroz"> Arroz</label>
<label><input type="checkbox" value="Farofa"> Farofa</label>
<label><input type="checkbox" value="Salada"> Salada</label>
<label><input type="checkbox" value="Vinagrete"> Vinagrete</label>
<label><input type="checkbox" value="Vatapá"> Vatapá</label>
`;
}else{
container.innerHTML = `
<p><strong>Itens:</strong></p>
<label><input type="checkbox" value="Baião cremoso"> Baião cremoso</label>
<label><input type="checkbox" value="Vatapá"> Vatapá</label>
<label><input type="checkbox" value="Escondidinho de carne"> Escondidinho de carne</label>
<label><input type="checkbox" value="Paçoca"> Paçoca</label>
<label><input type="checkbox" value="Macaxeira"> Macaxeira</label>
`;
}

atualizarTotal();
}

// ===== BATATA =====
function addBatata(){
countBatata++;
let div=document.createElement("div");
div.className="box";

div.innerHTML=`
<h3>Batata ${countBatata}</h3>

<label>Tipo:</label>
<select class="tipo">
<option value="11">Simples - R$11</option>
<option value="13">Com Calabresa - R$13</option>
<option value="11">Macaxeira - R$11</option>
</select>

<p><strong>Adicionais:</strong></p>
<label><input type="checkbox" value="Ketchup"> Ketchup</label>
<label><input type="checkbox" value="Maionese"> Maionese</label>
<label><input type="checkbox" value="Cheddar"> Cheddar</label>
<label><input type="checkbox" value="Catupiry"> Catupiry</label>

<button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>
`;

document.getElementById("batatas").appendChild(div);
atualizarTotal();
}
  function addCombo(){
countCombo++;

let div=document.createElement("div");
div.className="box";

div.innerHTML=`
<h3>Combo ${countCombo}</h3>

<label>Tipo:</label>
<select class="comboPreco">
<option value="20">Combo Econômico - R$20</option>
<option value="25">Combo Família - R$25</option>
<option value="30">Combo Especial - R$30</option>
</select>

<p><strong>Inclui:</strong></p>

<label><input type="checkbox" value="Pastel"> Pastel</label>
<label><input type="checkbox" value="Batata"> Batata</label>
<label><input type="checkbox" value="Refrigerante"> Refrigerante</label>

<button class="btnRemove"
onclick="this.parentElement.remove(); atualizarTotal()">
❌ Remover
</button>
`;

document.getElementById("combos").appendChild(div);
    atualizarSelectCombos();

atualizarTotal();
}

// ===== TOTAL =====
function atualizarTotal(){
let total=0;

// pastel
document.querySelectorAll("#pasteis .tam").forEach(s=> total+=parseInt(s.value));

// pratinho (dinâmico)
document.querySelectorAll("#pratinhos .tipo").forEach(s=>{
let preco = s.selectedOptions[0].dataset.preco;
total += parseInt(preco);
});

// batata
document.querySelectorAll("#batatas .tipo").forEach(s=> total+=parseInt(s.value));

// adicionais pratinho
document.querySelectorAll(".extraPrato:checked").forEach(()=> total+=3);
 
  // combos
document.querySelectorAll(".comboPreco").forEach(s=> total+=parseInt(s.value));

document.getElementById("total").innerText=total;
}

document.addEventListener("change", atualizarTotal);
 
  function salvarCardapio(){
localStorage.setItem(
"cardapio",
document.querySelector(".container").innerHTML
);
}

setInterval(salvarCardapio,2000);

// inicial
addPastel();  
atualizarSelectCombos();
  
// ===== RESUMO =====
function enviarPedido(){
let html="";
let total=document.getElementById("total").innerText;

document.querySelectorAll(".box").forEach((p,i)=>{
let titulo=p.querySelector("h3").innerText;
let tipo=p.querySelector("select")?.selectedOptions[0].text || "";

let add=[];
p.querySelectorAll("input:checked").forEach(c=>add.push(c.value));

html+=`<b>${titulo}:</b> ${tipo}`;
if(add.length) html+="<br>➕ "+add.join(", ");
html+="<br><br>";
});

html+=`<hr><b>Total: R$ ${total}</b>`;

document.getElementById("resumoConteudo").innerHTML=html;
document.getElementById("resumoBox").style.display="flex";
}

function fecharResumo(){
document.getElementById("resumoBox").style.display="none";
}

// ===== WHATSAPP =====
function confirmarPedido(){
let msg="Pedido:%0A";

document.querySelectorAll(".box").forEach((p,i)=>{
let titulo=p.querySelector("h3").innerText;
let tipo=p.querySelector("select")?.selectedOptions[0].text || "";

let add=[];
p.querySelectorAll("input:checked").forEach(c=>add.push(c.value));

msg+=`%0A${titulo}: ${tipo}`;
if(add.length) msg+=" - "+add.join(", ");
msg+="%0A";
});

msg+=`%0ATotal: R$ ${document.getElementById("total").innerText}`;

window.open("https://wa.me/5585992265249?text="+msg);
}
let combosAdmin = JSON.parse(localStorage.getItem("combosAdmin")) || [];


function abrirAdmin(){

let senha = prompt("Digite a senha:");

if(senha !== "0806"){
alert("Senha incorreta");
return;
}

document.getElementById("adminBox").style.display="flex";
mostrarCombosAdmin();

}

function criarComboAdmin(){
let nome = document.getElementById("nomeComboAdmin").value;
let desc = document.getElementById("descComboAdmin").value;
let preco = document.getElementById("precoComboAdmin").value;

if(nome === "" || preco === ""){
alert("Preencha pelo menos o nome e o preço do combo");
return;
}

combosAdmin.push({
nome:nome,
desc:desc,
preco:preco
});

localStorage.setItem("combosAdmin", JSON.stringify(combosAdmin));

document.getElementById("nomeComboAdmin").value="";
document.getElementById("descComboAdmin").value="";
document.getElementById("precoComboAdmin").value="";

mostrarCombosAdmin();
atualizarSelectCombos();
}

function mostrarCombosAdmin(){
let lista = document.getElementById("listaCombosAdmin");
lista.innerHTML="";

combosAdmin.forEach((combo,index)=>{
lista.innerHTML += `
<div class="box">
<strong>${combo.nome}</strong><br>
${combo.desc}<br>
R$ ${combo.preco}
<button class="btnRemove" onclick="removerComboAdmin(${index})">Remover</button>
</div>
`;
});
}

function removerComboAdmin(index){
combosAdmin.splice(index,1);
localStorage.setItem("combosAdmin", JSON.stringify(combosAdmin));
mostrarCombosAdmin();
atualizarSelectCombos();
}

function atualizarSelectCombos(){
document.querySelectorAll(".comboPreco").forEach(select=>{
select.innerHTML = "";

combosAdmin.forEach(combo=>{
select.innerHTML += `
<option value="${combo.preco}">${combo.nome} - R$${combo.preco}</option>
`;
});
});

atualizarTotal();
}
combosAdmin.forEach(combo=>{
select.innerHTML += `
<option value="${combo.preco}">${combo.nome} - R$${combo.preco}</option>
`;
});
});

atualizarTotal();
}
function fecharAdmin(){
document.getElementById("adminBox").style.display="none";
}
  function alternarCategoria(id){
let area = document.getElementById(id);

if(area.style.display === "none"){
area.style.display = "block";
localStorage.setItem(id, "block");
}else{
area.style.display = "none";
localStorage.setItem(id, "none");
}
}

function carregarCategorias(){
["pasteisArea","pratinhosArea","batatasArea","combosArea"].forEach(id=>{
let status = localStorage.getItem(id);
if(status){
document.getElementById(id).style.display = status;
}
});
}

carregarCategorias();
</script>

</body>
</html>
