<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanches da Merinha</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#fff5e6;}
header{background:linear-gradient(90deg,#ff7a00,#ff9a3c);color:white;text-align:center;padding:20px;font-size:26px;font-weight:600;}
.container{padding:20px;max-width:800px;margin:auto;}
h1{margin-top:25px;color:#333;}
h3{margin-top:12px;color:#333;}
.box{background:white;padding:15px;border-radius:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
label{display:block;margin:8px 0 4px;}
select,input,textarea{padding:10px;margin-top:5px;width:100%;border:1px solid #ddd;border-radius:8px;}
textarea{min-height:70px;resize:vertical;}
button{background:#25D366;color:white;border:none;padding:14px;border-radius:10px;width:100%;margin-top:10px;font-size:16px;cursor:pointer;}
.btnAdd{background:#ff7a00;}.btnRemove{background:#ff3c00;}.btnEdit{background:#007bff;}.btnDark{background:#333;}
.totalBox{background:#fff;border:2px solid #ff7a00;padding:15px;border-radius:12px;text-align:center;font-size:20px;margin-top:20px;}
.configBtn{position:fixed;right:15px;bottom:15px;width:55px;height:55px;border-radius:50%;background:#333;font-size:25px;z-index:10;padding:0;}
.adminBox,.resumoBox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000000cc;z-index:20;justify-content:center;align-items:center;}
.adminContent,.resumoContent{background:white;padding:20px;border-radius:12px;width:92%;max-width:500px;max-height:90%;overflow:auto;}
.item-card{border-left:5px solid #ff7a00;}
.empty{background:#fff;padding:15px;border-radius:12px;color:#777;text-align:center;margin:10px 0;}
.small{font-size:13px;color:#666;margin-top:8px;}
</style>
</head>
<body>
<header>🍔 Lanches da Merinha</header>
<div class="container">
  <div id="tortasArea">
    <h1>🥧 Tortas</h1>
    <h3>Torta Doce - R$10</h3>
    <div id="tortasDoces"></div>
    <button class="btnAdd" onclick="addTortaDocePedido()">➕ Adicionar torta doce</button>
    <h3>Torta Salgada - R$9</h3>
    <div id="tortasSalgadas"></div>
    <button class="btnAdd" onclick="addTortaSalgadaPedido()">➕ Adicionar torta salgada</button>
  </div>
  <div id="combosArea">
    <h1>🔥 Combos Especiais</h1>
    <div id="combos"></div>
    <button class="btnAdd" onclick="addCombo()">➕ Adicionar combo</button>
  </div>
  <div class="totalBox">Total: R$ <span id="total">0,00</span></div>
  <button onclick="enviarPedido()">Enviar pedido no WhatsApp</button>
</div>
<button class="configBtn" onclick="abrirAdmin()">⚙️</button>

<div id="adminBox" class="adminBox">
  <div class="adminContent">
    <h2>⚙️ Configurações</h2>
    <p class="small">Tudo que você cadastrar aqui fica salvo no Supabase e aparece para todas as pessoas.</p>
    <h3>Adicionar item</h3>
    <label>Tipo:</label>
    <select id="tipoAdmin" onchange="ajustarCamposAdmin()">
      <option value="combo">Combo Especial</option>
      <option value="torta_doce">Torta Doce</option>
      <option value="torta_salgada">Torta Salgada</option>
    </select>
    <input id="nomeAdmin" placeholder="Nome">
    <textarea id="descAdmin" placeholder="Descrição do combo ou observação"></textarea>
    <input id="precoAdmin" placeholder="Preço. Ex: 10" type="number" step="0.01">
    <button class="btnAdd" onclick="salvarItemAdmin()">Salvar item</button>
    <h3>Itens cadastrados</h3>
    <div id="listaAdmin"></div>
    <button class="btnRemove" onclick="fecharAdmin()">Fechar</button>
  </div>
</div>

<div id="resumoBox" class="resumoBox">
  <div class="resumoContent">
    <h2>🧾 Resumo do Pedido</h2>
    <div id="resumoConteudo"></div>
    <button onclick="confirmarPedido()">✅ Confirmar Pedido</button>
    <button onclick="fecharResumo()" class="btnRemove">❌ Cancelar</button>
  </div>
</div>

<script>
const SUPABASE_URL = "https://tateyjehwwdvybqtkmgf.supabase.co";
const SUPABASE_KEY = "sb_publishable_g-ioSixu3cn1uuKHP_puIg_huXcp_Xb";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let itens = [];
let countTortaDoce = 0;
let countTortaSalgada = 0;
let countCombo = 0;
let pedidoWhatsapp = "";

function formatarPreco(valor){
  return Number(valor || 0).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}

async function carregarItens(){
  const { data, error } = await db.from('cardapio_itens').select('*').order('criado_em', { ascending:true });
  if(error){
    alert('Erro ao carregar itens do Supabase. Confira se você criou a tabela cardapio_itens no SQL Editor.');
    console.error(error);
    return;
  }
  itens = data || [];
  atualizarSelects();
  mostrarAdmin();
}

function itensPorTipo(tipo){ return itens.filter(i => i.tipo === tipo); }

function criarSelect(tipo, classe){
  const lista = itensPorTipo(tipo);
  if(lista.length === 0){
    return `<option value="">Nenhuma opção cadastrada</option>`;
  }
  return lista.map(i => `<option value="${i.preco}" data-id="${i.id}" data-nome="${escapeHtml(i.nome)}" data-desc="${escapeHtml(i.descricao || '')}" data-preco="${i.preco}">${escapeHtml(i.nome)}${i.descricao ? ' - ' + escapeHtml(i.descricao) : ''} - R$${formatarPreco(i.preco)}</option>`).join('');
}

function escapeHtml(texto){
  return String(texto || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;');
}

function addTortaDocePedido(){
  countTortaDoce++;
  const div = document.createElement('div');
  div.className = 'box item-card';
  div.innerHTML = `<h3>Torta Doce ${countTortaDoce}</h3><label>Escolha a torta:</label><select class="produtoSelect tortaDoceSelect">${criarSelect('torta_doce')}</select><button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>`;
  document.getElementById('tortasDoces').appendChild(div);
  atualizarTotal();
}

function addTortaSalgadaPedido(){
  countTortaSalgada++;
  const div = document.createElement('div');
  div.className = 'box item-card';
  div.innerHTML = `<h3>Torta Salgada ${countTortaSalgada}</h3><label>Escolha a torta:</label><select class="produtoSelect tortaSalgadaSelect">${criarSelect('torta_salgada')}</select><button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>`;
  document.getElementById('tortasSalgadas').appendChild(div);
  atualizarTotal();
}

function addCombo(){
  countCombo++;
  const div = document.createElement('div');
  div.className = 'box item-card';
  div.innerHTML = `<h3>Combo ${countCombo}</h3><label>Escolha o combo:</label><select class="produtoSelect comboSelect" onchange="mostrarDescricaoCombo(this)">${criarSelect('combo')}</select><p class="descricaoComboPedido small"></p><button class="btnRemove" onclick="this.parentElement.remove(); atualizarTotal()">❌ Remover</button>`;
  document.getElementById('combos').appendChild(div);
  mostrarDescricaoCombo(div.querySelector('.comboSelect'));
  atualizarTotal();
}

function mostrarDescricaoCombo(select){
  const p = select.parentElement.querySelector('.descricaoComboPedido');
  const opt = select.selectedOptions[0];
  if(!opt || !opt.dataset.desc){ p.innerText = ''; return; }
  p.innerText = opt.dataset.desc;
}

function atualizarSelects(){
  document.querySelectorAll('.tortaDoceSelect').forEach(s => { const val=s.value; s.innerHTML=criarSelect('torta_doce'); s.value=val; });
  document.querySelectorAll('.tortaSalgadaSelect').forEach(s => { const val=s.value; s.innerHTML=criarSelect('torta_salgada'); s.value=val; });
  document.querySelectorAll('.comboSelect').forEach(s => { const val=s.value; s.innerHTML=criarSelect('combo'); s.value=val; mostrarDescricaoCombo(s); });
  atualizarTotal();
}

function atualizarTotal(){
  let total = 0;
  document.querySelectorAll('.produtoSelect').forEach(s => total += Number(s.value || 0));
  document.getElementById('total').innerText = formatarPreco(total);
}

document.addEventListener('change', atualizarTotal);

function textoSelect(box){
  const select = box.querySelector('select');
  if(!select || !select.selectedOptions[0] || !select.value) return 'Nenhuma opção cadastrada';
  const opt = select.selectedOptions[0];
  const nome = opt.dataset.nome || opt.textContent.trim();
  const desc = opt.dataset.desc || '';
  const preco = opt.dataset.preco || opt.value;
  return `${nome}${desc ? ' - ' + desc : ''} - R$${formatarPreco(preco)}`;
}

function enviarPedido(){
  let html = '';
  document.querySelectorAll('.item-card').forEach(p => {
    const titulo = p.querySelector('h3').innerText;
    html += `<b>${titulo}:</b> ${textoSelect(p)}<br><br>`;
  });
  html += `<hr><b>Total: R$ ${document.getElementById('total').innerText}</b>`;
  document.getElementById('resumoConteudo').innerHTML = html || 'Nenhum item adicionado.';
  document.getElementById('resumoBox').style.display = 'flex';
}

function fecharResumo(){ document.getElementById('resumoBox').style.display = 'none'; }

function confirmarPedido(){
  let msg = 'Pedido:%0A';
  document.querySelectorAll('.item-card').forEach(p => {
    const titulo = p.querySelector('h3').innerText;
    msg += `%0A${titulo}: ${encodeURIComponent(textoSelect(p))}%0A`;
  });
  msg += `%0ATotal: R$ ${encodeURIComponent(document.getElementById('total').innerText)}`;
  window.open('https://wa.me/5585992265249?text=' + msg, '_blank');
}

function abrirAdmin(){
  const senha = prompt('Digite a senha:');
  if(senha !== '0806'){ alert('Senha incorreta'); return; }
  document.getElementById('adminBox').style.display = 'flex';
  ajustarCamposAdmin();
  mostrarAdmin();
}

function fecharAdmin(){ document.getElementById('adminBox').style.display = 'none'; }

function ajustarCamposAdmin(){
  const tipo = document.getElementById('tipoAdmin').value;
  const desc = document.getElementById('descAdmin');
  const preco = document.getElementById('precoAdmin');
  if(tipo === 'torta_doce'){ desc.style.display='none'; preco.value = preco.value || '10'; }
  else if(tipo === 'torta_salgada'){ desc.style.display='none'; preco.value = preco.value || '9'; }
  else { desc.style.display='block'; }
}

async function salvarItemAdmin(){
  const tipo = document.getElementById('tipoAdmin').value;
  const nome = document.getElementById('nomeAdmin').value.trim();
  const descricao = tipo === 'combo' ? document.getElementById('descAdmin').value.trim() : '';
  const preco = Number(document.getElementById('precoAdmin').value.replace(',', '.'));
  if(!nome || !preco){ alert('Preencha nome e preço.'); return; }
  const { error } = await db.from('cardapio_itens').insert([{ tipo, nome, descricao, preco }]);
  if(error){ alert('Erro ao salvar no Supabase. Confira as permissões RLS.'); console.error(error); return; }
  document.getElementById('nomeAdmin').value = '';
  document.getElementById('descAdmin').value = '';
  document.getElementById('precoAdmin').value = '';
  await carregarItens();
  alert('Item salvo. Agora aparece para todo mundo.');
}

function mostrarAdmin(){
  const lista = document.getElementById('listaAdmin');
  if(!lista) return;
  if(itens.length === 0){ lista.innerHTML = '<div class="empty">Nenhum item cadastrado ainda.</div>'; return; }
  lista.innerHTML = itens.map(i => `<div class="box"><strong>${escapeHtml(nomeTipo(i.tipo))}: ${escapeHtml(i.nome)}</strong><br>${i.descricao ? escapeHtml(i.descricao) + '<br>' : ''}R$ ${formatarPreco(i.preco)}<button class="btnEdit" onclick="editarItem('${i.id}')">Editar</button><button class="btnRemove" onclick="removerItem('${i.id}')">Remover</button></div>`).join('');
}

function nomeTipo(tipo){
  if(tipo === 'combo') return 'Combo';
  if(tipo === 'torta_doce') return 'Torta Doce';
  return 'Torta Salgada';
}

async function editarItem(id){
  const item = itens.find(i => i.id === id);
  if(!item) return;
  const nome = prompt('Novo nome:', item.nome);
  if(nome === null) return;
  const descricao = item.tipo === 'combo' ? prompt('Nova descrição:', item.descricao || '') : '';
  if(descricao === null) return;
  const precoDigitado = prompt('Novo preço:', item.preco);
  if(precoDigitado === null) return;
  const preco = Number(String(precoDigitado).replace(',', '.'));
  if(!nome.trim() || !preco){ alert('Nome e preço são obrigatórios.'); return; }
  const { error } = await db.from('cardapio_itens').update({ nome:nome.trim(), descricao, preco }).eq('id', id);
  if(error){ alert('Erro ao editar.'); console.error(error); return; }
  await carregarItens();
}

async function removerItem(id){
  if(!confirm('Deseja remover este item?')) return;
  const { error } = await db.from('cardapio_itens').delete().eq('id', id);
  if(error){ alert('Erro ao remover.'); console.error(error); return; }
  await carregarItens();
}

carregarItens();
</script>
</body>
</html>
